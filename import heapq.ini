import heapq

class Graph:
    def __init__(self):
        self.adj_list = {}  

    def add_vertex(self, v):
        if v not in self.adj_list:
            self.adj_list[v] = []

    def add_edge(self, v1, v2, weight):
        self.adj_list[v1].append((v2, weight))
        self.adj_list[v2].append((v1, weight)) 

    def dijkstra(self, start):
        
        distances = {v: float('inf') for v in self.adj_list}
        distances[start] = 0
        
        heap = [(0, start)]
        visited = set()

        while heap:
            current_dist, current_v = heapq.heappop(heap)
            if current_v in visited:
                continue
            visited.add(current_v)

            
            for neighbor, weight in self.adj_list[current_v]:
                distance = current_dist + weight
                
                if distance < distances[neighbor]:
                    distances[neighbor] = distance
                    heapq.heappush(heap, (distance, neighbor))
        return distances


g = Graph()
g.add_vertex('A')
g.add_vertex('B')
g.add_vertex('C')
g.add_vertex('D')
g.add_vertex('E')
g.add_edge('A', 'B', 2)
g.add_edge('A', 'C', 4)
g.add_edge('B', 'E', 3)
g.add_edge('B', 'D', 1)
g.add_edge('C', 'D', 5)

print(g.dijkstra('A'))  # {'A':0, 'B':2, 'C':4, 'D':3, 'E':5}

